services:
  alphaloop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphaloop
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/storage/alphaloop.db
    env_file:
      - .env
    restart: unless-stopped
    command: uvicorn agent.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: alphaloop-dashboard
    ports:
      - "3001:3001"
    environment:
      - BACKEND_URL=http://alphaloop:8000
    depends_on:
      alphaloop:
        condition: service_healthy
    restart: unless-stopped
