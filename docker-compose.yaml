services:

  twak:
    build:
      context: .
      dockerfile: Dockerfile.twak
    container_name: alphaloop-twak
    environment:
      - 'TWAK_ACCESS_ID=${TWAK_ACCESS_ID}'
      - 'TWAK_HMAC_SECRET=${TWAK_HMAC_SECRET}'
      - 'AGENT_PRIVATE_KEY=${AGENT_PRIVATE_KEY}'
      - 'TWAK_WALLET_NAME=${TWAK_WALLET_NAME:-alphaloop}'
    volumes:
      - 'twak-data:/root/.twak'
    expose:
      - '3000'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  alphaloop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphaloop
    expose:
      - '8000'
    volumes:
      - 'alphaloop-storage:/app/storage'
    env_file:
      - .env
    environment:
      - 'DATABASE_URL=sqlite+aiosqlite:////app/storage/alphaloop.db'
      - 'TWAK_REST_URL=http://twak:3000'
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    depends_on:
      - twak
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
        NPM_CONFIG_PRODUCTION: "false"
    container_name: alphaloop-dashboard
    expose:
      - '3001'
    environment:
      - 'BACKEND_URL=http://alphaloop:8000'
    depends_on:
      - alphaloop
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -qO
        - /dev/null
        - http://localhost:3001/
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  twak-data:
  alphaloop-storage:
